version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kodnest_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kodnest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kodnest}
      POSTGRES_DB: ${POSTGRES_DB:-kodnestcareers}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: kodnest_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: kodnest_mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_HTTP_PORT:-8025}:8025"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    command: pnpm dev:web
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis
      - mailpit
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: pnpm dev:worker
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis
      - mailpit

volumes:
  postgres_data:
  redis_data:

